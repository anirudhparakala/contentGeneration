run_mode:
  manual: true
  recency_days: 30

caps:
  max_entries_per_source: 50
  max_transcripts_per_run: 10
  max_asr_fallbacks_per_run: 3

http:
  user_agent: "ai-content-engine/0.1 (+contact: local)"
  connect_timeout_s: 10
  read_timeout_s: 20
  max_response_mb: 5
  retries:
    max_attempts: 3

paths:
  sqlite_db: "data/state.db"
  outputs_dir: "data/outputs"