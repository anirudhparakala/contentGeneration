run_mode:
  manual: true
  recency_days: 30

caps:
  max_entries_per_source: 50
  max_transcripts_per_run: 10
  max_asr_fallbacks_per_run: 3

http:
  user_agent: "ai-content-engine/0.1 (+contact: local)"
  connect_timeout_s: 10
  read_timeout_s: 20
  max_response_mb: 5
  retries:
    max_attempts: 3

paths:
  sqlite_db: "data/state_stage1_refresh.db"
  outputs_dir: "data/outputs"

stage_3_filter:
  min_content_chars: 120
  min_relevance_score: 3
  max_candidates_default: 100
  keyword_groups:
    ai_automation:
      weight: 1
      terms:
        - ai
        - agent
        - agents
        - automation
        - automated
        - workflow
        - workflows
        - zapier
        - n8n
        - make.com
        - make
        - integromat
        - webhook
        - api
        - llm
        - gpt
        - openai
        - prompt
        - prompts
        - tool
        - tools
    monetization:
      weight: 2
      terms:
        - monetize
        - monetization
        - revenue
        - profit
        - income
        - side hustle
        - hustle
        - agency
        - client
        - clients
        - lead
        - leads
        - outreach
        - funnel
        - funnels
        - sales
        - offer
        - offers
        - retainer
        - pricing
        - cold email
        - cold outreach
        - freelanc
        - consulting
